name: release-on-version-bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read versions
        id: versions
        run: |
          PREV_VERSION=$(
            git show HEAD~1:pyproject.toml |
            python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          )
          CUR_VERSION=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )

          echo "prev=$PREV_VERSION" >> "$GITHUB_OUTPUT"
          echo "current=$CUR_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version change
        id: check
        run: |
          if [ "${{ steps.versions.outputs.prev }}" = "${{ steps.versions.outputs.current }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Find previous version commit and tag it
        id: tag
        if: steps.check.outputs.changed == 'true'
        run: |
          TAG="v${{ steps.versions.outputs.prev }}"
                  
          TARGET_COMMIT=$(
            git log --pretty=format:%H -- pyproject.toml | while read commit; do
              prev=$(git show "${commit}^:pyproject.toml" 2>/dev/null | \
                python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])' 2>/dev/null)
                  
              curr=$(git show "${commit}:pyproject.toml" | \
                python -c 'import tomllib,sys; print(tomllib.loads(sys.stdin.read())["project"]["version"])')
                  
              if [ "$prev" != "$curr" ] && [ "$curr" = "${{ steps.versions.outputs.prev }}" ]; then
                echo "$commit"
                break
              fi
            done
          )
                  
          if [ -z "$TARGET_COMMIT" ]; then
            echo "Could not find matching commit for version $TAG"
            exit 1
          fi
                  
          git tag "$TAG" "$TARGET_COMMIT"
          git push origin "$TAG"
                  
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build package
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          VERSION="${VERSION#v}"
          OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          pyinstaller builder.py modules/*.py \
            -n StaticGalleryBuilder-${VERSION}-${OS} \
            -F \
            --add-data files:files \
            --add-data templates:templates \
            --add-data themes:themes

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StaticGalleryBuilder-${{ runner.os }}
          path: dist/StaticGalleryBuilder*

  release:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    if: needs.version.outputs.changed == 'true'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: dist/**/*
